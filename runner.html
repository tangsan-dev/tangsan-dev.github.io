<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Endless Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: Arial, sans-serif; overflow: hidden; }
    canvas { display: block; }
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,20,0.95);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white; z-index: 20; text-align: center; padding: 20px;
    }
    #overlay h1 { color: #e94560; font-size: 2rem; margin-bottom: 8px; }
    #overlay p { color: #a8b2d8; margin: 4px 0; font-size: 0.9rem; }
    .big-score { font-size: 2.5rem; font-weight: bold; color: #00ff88; margin: 10px 0; display: none; }
    .btn {
      padding: 13px 35px; background: #e94560;
      color: white; border: none; border-radius: 30px;
      font-size: 1.1rem; cursor: pointer; margin: 6px;
    }
    .btn-shop {
      padding: 13px 35px; background: #0f3460;
      color: white; border: 2px solid #4488ff; border-radius: 30px;
      font-size: 1.1rem; cursor: pointer; margin: 6px;
    }
    #shop {
      position: fixed; inset: 0;
      background: rgba(0,0,20,0.97);
      display: none; flex-direction: column;
      align-items: center; z-index: 25;
      color: white; padding: 20px; overflow-y: auto;
    }
    #shop h2 { color: #e94560; font-size: 1.6rem; margin-bottom: 5px; }
    .coin-display { color: #ffcc00; font-size: 1.1rem; margin-bottom: 15px; }
    .char-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; width: 100%; max-width: 400px; }
    .char-card {
      background: #16213e; border-radius: 12px;
      padding: 12px; width: 140px; text-align: center;
      border: 2px solid #0f3460; cursor: pointer;
    }
    .char-card.owned { border-color: #00cc66; }
    .char-card.selected { border-color: #e94560; }
    .char-preview { width: 60px; height: 80px; margin: 0 auto 8px; }
    .char-name { font-size: 0.9rem; font-weight: bold; margin-bottom: 4px; }
    .char-price { color: #ffcc00; font-size: 0.85rem; }
    .char-status { font-size: 0.8rem; margin-top: 4px; }
    #closeShop {
      margin-top: 15px; padding: 12px 30px;
      background: #333; color: white; border: none;
      border-radius: 25px; font-size: 1rem; cursor: pointer;
    }
    #jumpBtn {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 120px;
      background: rgba(233,69,96,0.3);
      border: 3px solid #e94560; border-radius: 50%;
      color: white; font-size: 2.5rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; user-select: none; z-index: 10;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="jumpBtn">⬆</div>

<div id="overlay">
  <h1>🏃 Endless Runner</h1>
  <p>Tap ⬆ atau layar untuk lompat!</p>
  <p style="font-size:0.8rem;color:#555">Kumpulkan 🪙 untuk beli karakter baru!</p>
  <div class="big-score" id="deadScore"></div>
  <div style="margin-top:5px;color:#ffcc00" id="coinDisplay">🪙 0</div>
  <div style="display:flex;flex-wrap:wrap;justify-content:center">
    <button class="btn" id="playBtn">▶ Mulai</button>
    <button class="btn-shop" onclick="openShop()">🛍 Toko</button>
  </div>
</div>

<div id="shop">
  <h2>🛍 Toko Karakter</h2>
  <div class="coin-display" id="shopCoins">🪙 0</div>
  <div class="char-grid" id="charGrid"></div>
  <button id="closeShop" onclick="closeShop()">✕ Tutup</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const W = canvas.width, H = canvas.height;
const GND = H * 0.75;

// Characters
const CHARS = [
  { id:0, name:'Runner', price:0, color:'#4488ff', skinColor:'#ffcc99', hairColor:'#333', desc:'Karakter awal' },
  { id:1, name:'Ninja', price:50, color:'#222', skinColor:'#cc8855', hairColor:'#111', desc:'Cepat & lincah' },
  { id:2, name:'Astronot', price:100, color:'#cccccc', skinColor:'#ffddbb', hairColor:'#ffffff', desc:'Dari luar angkasa' },
  { id:3, name:'Warrior', price:200, color:'#cc4400', skinColor:'#ffaa77', hairColor:'#8B4513', desc:'Pejuang kuat' },
  { id:4, name:'Robot', price:350, color:'#888', skinColor:'#aaaaaa', hairColor:'#666', desc:'Mesin tak kenal lelah' },
  { id:5, name:'Dragon', price:500, color:'#cc0000', skinColor:'#ff4400', hairColor:'#ff8800', desc:'Legenda berlari' },
];

// Save data
let coins = +localStorage.getItem('rc_coins')||0;
let owned = JSON.parse(localStorage.getItem('rc_owned')||'[0]');
let selectedChar = +localStorage.getItem('rc_char')||0;
let best = +localStorage.getItem('rc_best')||0;

function save() {
  localStorage.setItem('rc_coins', coins);
  localStorage.setItem('rc_owned', JSON.stringify(owned));
  localStorage.setItem('rc_char', selectedChar);
  localStorage.setItem('rc_best', best);
}

// Game state
let P, obstacles, coins_arr, particles, clouds;
let score, running, raf, speed, frame, dist;
let jumping, jumpV, onGround;
let legAnim = 0;

function initGame() {
  document.getElementById('overlay').style.display = 'none';
  const ch = CHARS[selectedChar];
  P = { x: W*0.18, y: GND, w: 28, h: 52, ch };
  obstacles = []; coins_arr = []; particles = [];
  score = 0; speed = 5; frame = 0; dist = 0;
  jumping = false; jumpV = 0; onGround = true;
  legAnim = 0;
  clouds = Array(5).fill(0).map((_,i)=>({
    x: W*0.2 + i*(W/5), y: H*0.1 + Math.random()*H*0.2,
    w: 60+Math.random()*80, spd: 1+Math.random()
  }));
  running = true;
  if(raf) cancelAnimationFrame(raf);
  loop();
}

document.getElementById('playBtn').onclick = initGame;

function jump() {
  if(onGround) {
    jumping = true; onGround = false;
    jumpV = -18;
  }
}

// Draw human character
function drawHuman(x, y, ch, leg) {
  const c = ch.color, s = ch.skinColor, h = ch.hairColor;
  const cx = x, cy = y; // cy = bottom of character

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(cx, cy+2, 18, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // Legs
  const legSwing = Math.sin(leg) * 15;
  // Left leg
  ctx.strokeStyle = c; ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx-5, cy-18);
  ctx.lineTo(cx-8+legSwing, cy);
  ctx.stroke();
  // Right leg
  ctx.beginPath();
  ctx.moveTo(cx+5, cy-18);
  ctx.lineTo(cx+8-legSwing, cy);
  ctx.stroke();

  // Shoes
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.ellipse(cx-8+legSwing, cy, 9, 5, 0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+8-legSwing, cy, 9, 5, -0.2, 0, Math.PI*2); ctx.fill();

  // Body
  const bodyG = ctx.createLinearGradient(cx-12, cy-45, cx+12, cy-18);
  bodyG.addColorStop(0, lightenColor(c, 40));
  bodyG.addColorStop(1, c);
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.roundRect(cx-12, cy-45, 24, 27, 5);
  ctx.fill();

  // Arms
  const armSwing = Math.cos(leg) * 20;
  ctx.strokeStyle = c; ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(cx-10, cy-40);
  ctx.lineTo(cx-18, cy-28+armSwing);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx+10, cy-40);
  ctx.lineTo(cx+18, cy-28-armSwing);
  ctx.stroke();

  // Hands
  ctx.fillStyle = s;
  ctx.beginPath(); ctx.arc(cx-18, cy-28+armSwing, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+18, cy-28-armSwing, 5, 0, Math.PI*2); ctx.fill();

  // Neck
  ctx.fillStyle = s;
  ctx.fillRect(cx-5, cy-52, 10, 10);

  // Head
  ctx.fillStyle = s;
  ctx.beginPath(); ctx.arc(cx, cy-60, 14, 0, Math.PI*2); ctx.fill();

  // Hair / helmet
  if(ch.id === 2) {
    // Astronot helmet
    ctx.strokeStyle = '#aaaaaa'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(cx, cy-60, 17, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = 'rgba(100,200,255,0.3)';
    ctx.beginPath(); ctx.arc(cx, cy-60, 17, 0, Math.PI*2); ctx.fill();
  } else if(ch.id === 4) {
    // Robot head
    ctx.fillStyle = '#888';
    ctx.fillRect(cx-14, cy-75, 28, 22);
    ctx.fillStyle = '#00ffff';
    ctx.fillRect(cx-8, cy-68, 7, 7);
    ctx.fillRect(cx+1, cy-68, 7, 7);
  } else {
    // Hair
    ctx.fillStyle = h;
    ctx.beginPath();
    ctx.arc(cx, cy-60, 14, Math.PI, 0);
    ctx.fill();
    if(ch.id === 0) {
      // Spiky hair
      ctx.beginPath(); ctx.moveTo(cx-8, cy-72); ctx.lineTo(cx-4, cy-80); ctx.lineTo(cx, cy-73); ctx.lineTo(cx+4, cy-80); ctx.lineTo(cx+8, cy-72); ctx.fill();
    } else if(ch.id === 1) {
      // Ninja headband
      ctx.fillStyle = '#cc0000';
      ctx.fillRect(cx-15, cy-66, 30, 7);
    } else if(ch.id === 3) {
      // Warrior helmet
      ctx.fillStyle = '#cc4400';
      ctx.beginPath(); ctx.arc(cx, cy-62, 16, Math.PI, 0); ctx.fill();
      ctx.fillRect(cx-16, cy-63, 32, 6);
    } else if(ch.id === 5) {
      // Dragon horns
      ctx.fillStyle = '#ff4400';
      ctx.beginPath(); ctx.moveTo(cx-10, cy-73); ctx.lineTo(cx-15, cy-88); ctx.lineTo(cx-4, cy-73); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx+10, cy-73); ctx.lineTo(cx+15, cy-88); ctx.lineTo(cx+4, cy-73); ctx.fill();
    }
  }

  // Eyes
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(cx-5, cy-61, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+5, cy-61, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(cx-4, cy-61, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+6, cy-61, 2, 0, Math.PI*2); ctx.fill();

  // Special: Dragon tail
  if(ch.id === 5) {
    ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(cx-12, cy-25);
    ctx.bezierCurveTo(cx-30, cy-15, cx-40, cy-5, cx-35+legSwing, cy-20);
    ctx.stroke();
  }
}

function lightenColor(hex, amt) {
  try {
    let r=parseInt(hex.slice(1,3),16)+amt;
    let g=parseInt(hex.slice(3,5),16)+amt;
    let b=parseInt(hex.slice(5,7),16)+amt;
    r=Math.min(255,r); g=Math.min(255,g); b=Math.min(255,b);
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
  } catch(e) { return hex; }
}

function drawObstacle(o) {
  if(o.type === 0) {
    // Rock
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.ellipse(o.x, o.y, o.w/2, o.h/2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#aaa';
    ctx.beginPath();
    ctx.ellipse(o.x-5, o.y-5, o.w/4, o.h/4, 0, 0, Math.PI*2);
    ctx.fill();
  } else if(o.type === 1) {
    // Cactus
    ctx.fillStyle = '#2d8a00';
    ctx.fillRect(o.x-8, o.y-o.h, 16, o.h);
    ctx.fillRect(o.x-22, o.y-o.h*0.65, 14, 10);
    ctx.fillRect(o.x+8, o.y-o.h*0.5, 14, 10);
    ctx.fillRect(o.x-22, o.y-o.h*0.65-15, 8, 15);
    ctx.fillRect(o.x+16, o.y-o.h*0.5-12, 8, 12);
  } else {
    // Log
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(o.x-o.w/2, o.y-o.h, o.w, o.h);
    ctx.fillStyle = '#a0522d';
    ctx.fillRect(o.x-o.w/2, o.y-o.h, o.w, 8);
    // Tree rings
    ctx.strokeStyle = '#6B3410'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(o.x, o.y-o.h+4, o.w/2-3, 4, 0, 0, Math.PI*2); ctx.stroke();
  }
}

function drawCoin(cn) {
  ctx.save();
  ctx.fillStyle = '#ffcc00';
  ctx.shadowColor = '#ffaa00';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(cn.x, cn.y, 12, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ffee44';
  ctx.beginPath();
  ctx.arc(cn.x-2, cn.y-2, 6, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#cc8800';
  ctx.font = 'bold 11px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('$', cn.x+1, cn.y+4);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBG() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, GND);
  sky.addColorStop(0, '#0a0a1a');
  sky.addColorStop(1, '#1a2a4a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GND);

  // Moon
  ctx.fillStyle = '#fffde7';
  ctx.beginPath(); ctx.arc(W*0.85, H*0.08, 25, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#e8e4a0';
  ctx.beginPath(); ctx.arc(W*0.85+8, H*0.08-5, 18, 0, Math.PI*2); ctx.fill();

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  [50,120,200,300,350,420,500,600,650,700].forEach(sx => {
    [20,50,90,130].forEach(sy => {
      ctx.beginPath();
      ctx.arc(sx, sy, 1, 0, Math.PI*2);
      ctx.fill();
    });
  });

  // Clouds
  clouds.forEach(cl => {
    cl.x -= cl.spd * 0.5;
    if(cl.x + cl.w < 0) cl.x = W + cl.w;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.ellipse(cl.x, cl.y, cl.w/2, 15, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cl.x-20, cl.y+5, cl.w/3, 12, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cl.x+25, cl.y+5, cl.w/3.5, 11, 0, 0, Math.PI*2); ctx.fill();
  });

  // Mountains bg
  ctx.fillStyle = '#1a2a3a';
  ctx.beginPath();
  ctx.moveTo(0, GND);
  [0,80,160,250,330,420,500,600,700,W].forEach((mx,i) => {
    const mh = i%2===0 ? GND-60 : GND-100;
    ctx.lineTo(mx, mh);
  });
  ctx.lineTo(W, GND); ctx.closePath(); ctx.fill();

  // Ground
  const grd = ctx.createLinearGradient(0, GND, 0, H);
  grd.addColorStop(0, '#2d5a1b');
  grd.addColorStop(0.1, '#3d7a25');
  grd.addColorStop(1, '#1a3a0a');
  ctx.fillStyle = grd;
  ctx.fillRect(0, GND, W, H-GND);

  // Ground line
  ctx.strokeStyle = '#4a9a2a';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, GND); ctx.lineTo(W, GND); ctx.stroke();

  // Ground details (moving dots)
  ctx.fillStyle = '#4a9a2a';
  for(let i=0; i<8; i++) {
    const gx = ((dist*2 + i*120) % (W+20)) - 10;
    ctx.fillRect(gx, GND+5, 40+i*5, 3);
  }
}

function spawnObstacle() {
  const t = Math.floor(Math.random()*3);
  const heights = [35, 55, 40];
  const widths = [50, 40, 45];
  obstacles.push({
    x: W+30, y: GND,
    w: widths[t], h: heights[t], type: t
  });
}

function spawnCoin() {
  const h = GND - 30 - Math.random()*80;
  coins_arr.push({ x: W+20, y: h });
}

function burst(x, y, col) {
  for(let i=0; i<8; i++) {
    particles.push({
      x, y,
      dx: (Math.random()-.5)*8,
      dy: (Math.random()-.5)*8,
      r: Math.random()*5+2,
      life: 1, col
    });
  }
}

function loop() {
  if(!running) return;
  frame++;
  dist += speed;

  // Background
  drawBG();

  // Speed up
  if(frame % 300 === 0) speed = Math.min(speed + 0.5, 15);

  // Spawn
  if(frame % Math.max(60, 120 - Math.floor(score/50)) === 0) spawnObstacle();
  if(frame % 80 === 0) spawnCoin();

  // Jump physics
  if(!onGround) {
    P.y += jumpV;
    jumpV += 0.9;
    if(P.y >= GND) {
      P.y = GND; onGround = true; jumping = false; jumpV = 0;
    }
  }

  // Leg animation
  if(onGround) legAnim += 0.25;
  else legAnim = 0;

  // Move obstacles
  obstacles = obstacles.filter(o => o.x > -100);
  obstacles.forEach(o => {
    o.x -= speed;
    drawObstacle(o);
    // Collision
    if(Math.abs(o.x - P.x) < o.w*0.45 && P.y - P.h*0.3 > o.y - o.h - 5) {
      burst(P.x, P.y, '#e94560');
      gameOver();
      return;
    }
  });

  // Move coins
  coins_arr = coins_arr.filter(cn => cn.x > -20);
  coins_arr.forEach((cn, ci) => {
    cn.x -= speed;
    drawCoin(cn);
    // Collect
    if(Math.abs(cn.x - P.x) < 25 && Math.abs(cn.y - P.y) < 40) {
      coins_arr.splice(ci, 1);
      coins++;
      score += 5;
      burst(cn.x, cn.y, '#ffcc00');
      save();
    }
  });

  // Draw player
  drawHuman(P.x, P.y, P.ch, legAnim);

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.dx; p.y += p.dy; p.life -= 0.05;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Score
  score += 0.05;
  if(score > best) { best = Math.floor(score); save(); }

  // UI
  ctx.fillStyle = 'white';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(`⭐ ${Math.floor(score)}`, 15, 35);
  ctx.textAlign = 'right';
  ctx.fillText(`🏆 ${best}`, W-15, 35);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.fillText(`🪙 ${coins}`, W/2, 35);
  ctx.fillStyle = '#a8b2d8';
  ctx.font = '13px Arial';
  ctx.fillText(`Speed: ${speed.toFixed(1)}`, W/2, 52);

  raf = requestAnimationFrame(loop);
}

function gameOver() {
  running = false;
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.querySelector('h1').textContent = '💀 Game Over!';
  document.getElementById('deadScore').style.display = 'block';
  document.getElementById('deadScore').textContent = Math.floor(score);
  document.getElementById('coinDisplay').textContent = `🪙 ${coins}`;
  document.getElementById('playBtn').textContent = '🔄 Main Lagi';
}

// Shop
function openShop() {
  document.getElementById('shop').style.display = 'flex';
  document.getElementById('shopCoins').textContent = `🪙 ${coins}`;
  renderShop();
}

function closeShop() {
  document.getElementById('shop').style.display = 'none';
}

function renderShop() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  CHARS.forEach(ch => {
    const isOwned = owned.includes(ch.id);
    const isSelected = ch.id === selectedChar;
    const card = document.createElement('div');
    card.className = 'char-card' + (isOwned ? ' owned' : '') + (isSelected ? ' selected' : '');

    // Mini preview canvas
    const cv = document.createElement('canvas');
    cv.width = 60; cv.height = 80;
    cv.className = 'char-preview';
    const cx2 = cv.getContext('2d');
    cx2.fillStyle = '#0f1a2e';
    cx2.fillRect(0, 0, 60, 80);
    // Draw mini character
    cx2.save();
    cx2.scale(0.55, 0.55);
    cx2.translate(55, 90);
    drawHumanMini(cx2, 0, 0, ch);
    cx2.restore();

    card.appendChild(cv);

    const name = document.createElement('div');
    name.className = 'char-name';
    name.textContent = ch.name;
    card.appendChild(name);

    const price = document.createElement('div');
    price.className = 'char-price';
    price.textContent = ch.price === 0 ? 'Gratis' : `🪙 ${ch.price}`;
    card.appendChild(price);

    const status = document.createElement('div');
    status.className = 'char-status';
    if(isSelected) { status.textContent = '✅ Dipilih'; status.style.color = '#e94560'; }
    else if(isOwned) { status.textContent = '👆 Pilih'; status.style.color = '#00cc66'; }
    else if(coins >= ch.price) { status.textContent = '💰 Beli'; status.style.color = '#ffcc00'; }
    else { status.textContent = `Kurang ${ch.price - coins} 🪙`; status.style.color = '#888'; }
    card.appendChild(status);

    card.onclick = () => {
      if(isSelected) return;
      if(isOwned) {
        selectedChar = ch.id;
        save();
        renderShop();
      } else if(coins >= ch.price) {
        coins -= ch.price;
        owned.push(ch.id);
        selectedChar = ch.id;
        save();
