<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }
    h1 { color: #e94560; margin-bottom: 10px; font-size: 1.8rem; }
    .info {
      display: flex;
      gap: 20px;
      margin-bottom: 10px;
      font-size: 1rem;
    }
    .info span { color: #a8b2d8; }
    .info b { color: #e94560; }
    .level-bar-container {
      width: 300px;
      height: 8px;
      background: #0f3460;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .level-bar {
      height: 8px;
      background: #e94560;
      border-radius: 10px;
      transition: width 0.3s;
    }
    canvas {
      border: 3px solid #e94560;
      border-radius: 10px;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      gap: 5px;
      margin-top: 15px;
    }
    .btn {
      background: #e94560;
      border: none;
      color: white;
      font-size: 1.5rem;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn-empty { background: transparent; }
    #restartBtn {
      margin-top: 15px;
      padding: 10px 30px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🐍 Snake Game</h1>
  <div class="info">
    <span>Score: <b id="score">0</b></span>
    <span>Best: <b id="highscore">0</b></span>
    <span>Level: <b id="level">1</b></span>
  </div>
  <div class="level-bar-container">
    <div class="level-bar" id="levelBar" style="width:0%"></div>
  </div>
  <canvas id="gameCanvas" width="300" height="300"></canvas>
  <div class="controls">
    <div class="btn-empty"></div>
    <button class="btn" onclick="changeDir(0,-1)">▲</button>
    <div class="btn-empty"></div>
    <button class="btn" onclick="changeDir(-1,0)">◀</button>
    <div class="btn-empty"></div>
    <button class="btn" onclick="changeDir(1,0)">▶</button>
    <div class="btn-empty"></div>
    <button class="btn" onclick="changeDir(0,1)">▼</button>
    <div class="btn-empty"></div>
  </div>
  <button id="restartBtn" onclick="restartGame()">🔄 Restart</button>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const box = 20;
    let snake, food, dx, dy, score, gameLoop, level, foodEaten, highscore;

    highscore = 0;

    function startGame() {
      snake = [{x: 7, y: 7}];
      dx = 1; dy = 0;
      score = 0;
      level = 1;
      foodEaten = 0;
      placeFood();
      updateUI();
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(draw, getSpeed());
    }

    function getSpeed() {
      return Math.max(80, 200 - (level - 1) * 20);
    }

    function placeFood() {
      food = {
        x: Math.floor(Math.random() * 15),
        y: Math.floor(Math.random() * 15)
      };
    }

    function changeDir(newDx, newDy) {
      if (newDx === -dx && newDy === -dy) return;
      dx = newDx; dy = newDy;
    }

    function updateUI() {
      document.getElementById('score').textContent = score;
      document.getElementById('highscore').textContent = highscore;
      document.getElementById('level').textContent = level;
      const progress = (foodEaten % 5) / 5 * 100;
      document.getElementById('levelBar').style.width = progress + '%';
    }

    function draw() {
      ctx.fillStyle = '#0f0f0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Makanan
      ctx.fillStyle = '#e94560';
      ctx.beginPath();
      ctx.arc(food.x * box + box/2, food.y * box + box/2, box/2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Ular
      snake.forEach((seg, i) => {
        ctx.fillStyle = i === 0 ? '#00ff88' : '#00cc66';
        ctx.fillRect(seg.x * box + 1, seg.y * box + 1, box - 2, box - 2);
      });

      const head = {x: snake[0].x + dx, y: snake[0].y + dy};

      if (head.x < 0 || head.x >= 15 || head.y < 0 || head.y >= 15) {
        gameOver(); return;
      }
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver(); return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += level * 10;
        foodEaten++;

        // Naik level setiap 5 makanan
        if (foodEaten % 5 === 0) {
          level++;
          clearInterval(gameLoop);
          gameLoop = setInterval(draw, getSpeed());

          // Flash level up
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#00ff88';
          ctx.font = 'bold 28px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('LEVEL ' + level + '!', 150, 150);
        }

        if (score > highscore) highscore = score;
        updateUI();
        placeFood();
      } else {
        snake.pop();
      }
    }

    function gameOver() {
      clearInterval(gameLoop);
      if (score > highscore) highscore = score;
      updateUI();
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#e94560';
      ctx.font = 'bold 24px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER!', 150, 120);
      ctx.fillStyle = 'white';
      ctx.font = '18px Arial';
      ctx.fillText('Score: ' + score, 150, 155);
      ctx.fillStyle = '#00ff88';
      ctx.fillText('Best: ' + highscore, 150, 185);
    }

    function restartGame() { startGame(); }

    startGame();
  </script>
</body>
  </html>
